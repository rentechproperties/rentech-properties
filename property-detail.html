<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Detail | Rentech Properties</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .detail-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 2rem 0; }
    .hero-main img { width: 100%; border-radius: 16px; aspect-ratio: 4/3; object-fit: cover; }
    .detail-price { font-size: 2rem; font-weight: 800; color: var(--primary, #2563eb); }
    .detail-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .detail-meta span { background: #f0f4ff; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; }
    .amenities-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 1rem 0; }
    .cta-box { position: sticky; top: 100px; background: var(--card-bg,#fff); border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.1); border: 1px solid var(--border,#e8e8e8); }
    .layout-cols { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; align-items: start; }
    .trust-badges { display: flex; flex-direction: column; gap: 8px; margin: 1rem 0; }
    .trust-badge { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    @media(max-width:768px){ .layout-cols,.detail-hero{ grid-template-columns:1fr; } .cta-box { position:static; } }
  </style>
</head>
<body>
  <nav><!-- your existing nav --></nav>

  <div class="container" style="max-width:1100px;margin:0 auto;padding:1rem 1.5rem">
    <div id="breadcrumb" style="font-size:0.85rem;color:#6b7280;margin-bottom:1rem">
      <a href="index.html">Home</a> › <a href="properties.html">Browse</a> › <span id="bcTitle">Loading...</span>
    </div>

    <div id="detailRoot">
      <!-- Rendered by property-detail.js -->
      <div style="text-align:center;padding:4rem">
        <div style="font-size:2rem">⏳</div>
        <p>Loading property...</p>
      </div>
    </div>
  </div>

  <script>
  (async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { document.getElementById('detailRoot').innerHTML = '<p style="text-align:center;padding:4rem">Property not found. <a href="properties.html">Browse all →</a></p>'; return; }

    try {
      const res = await fetch('data/properties.json');
      const all = await res.json();
      const p = all.find(x => x.id === id);
      if (!p) throw new Error('Not found');

      document.title = `${p.title} — ${p.area} | Rentech Properties`;
      document.getElementById('bcTitle').textContent = p.title;

      const waMsg = encodeURIComponent(`Hi Rentech! I'm interested in: ${p.title} in ${p.area} at KSh ${p.price.toLocaleString()}/mo (ID: ${p.id}). Please arrange a viewing.`);
      const amenityIcons = { 'Parking':'🚗','24hr Security':'🛡️','Borehole Water':'💧','Furnished':'🛋️','Gym':'💪','Balcony':'🌇','Garden':'🌿' };
      const marketAvg = p.price * 1.12;
      const saving = Math.round(((marketAvg - p.price) / marketAvg) * 100);

      document.getElementById('detailRoot').innerHTML = `
        <div class="layout-cols">
          <div>
            <div class="detail-hero">
              <div class="hero-main"><img src="${p.images[0]}" alt="${p.title}"></div>
            </div>

            <span class="badge badge-verified">✓ ID Verified Landlord</span>
            <span class="badge badge-verified" style="background:#3b82f6;margin-left:6px">✓ Property Inspected</span>
            ${p.featured ? '<span class="badge badge-featured" style="margin-left:6px">⭐ Featured</span>' : ''}

            <h1 style="margin:1rem 0 0.25rem;font-size:1.8rem">${p.title}</h1>
            <div style="color:#6b7280;margin-bottom:0.5rem">📍 ${p.area}, Nairobi</div>
            <div class="detail-price">KSh ${p.price.toLocaleString()}<span style="font-size:1rem;font-weight:400;color:#6b7280">/month</span></div>
            ${saving > 0 ? `<div style="color:#10b981;font-size:0.85rem;margin-top:4px">💡 ${saving}% below market average — great deal!</div>` : ''}

            <div class="detail-meta" style="margin-top:1rem">
              <span>🛏 ${p.bedrooms} Bedroom${p.bedrooms>1?'s':''}</span>
              <span>🚿 ${p.bathrooms} Bathroom${p.bathrooms>1?'s':''}</span>
              <span>${p.furnished ? '🛋️ Furnished' : '🏠 Unfurnished'}</span>
              <span>📐 ${p.type}</span>
            </div>

            <h3>About This Property</h3>
            <p style="line-height:1.7;color:#374151">${p.description}</p>

            <h3>Amenities</h3>
            <div class="amenities-grid">
              ${p.amenities.map(a => `<span class="amenity-tag" style="padding:6px 14px;font-size:0.85rem">${amenityIcons[a]||'✓'} ${a}</span>`).join('')}
            </div>

            <h3>📍 Location</h3>
            <a href="https://maps.google.com/?q=${p.coords.lat},${p.coords.lng}" target="_blank"
               style="display:block;background:#f0f4ff;border-radius:12px;padding:1.5rem;text-align:center;text-decoration:none;color:#2563eb;font-weight:600;margin-bottom:2rem">
              🗺️ View on Google Maps — ${p.area}, Nairobi
            </a>

            <div style="background:#fffbeb;border:1px solid #f59e0b;border-radius:12px;padding:1rem;font-size:0.85rem;color:#92400e">
              ⚠️ <strong>Safety tip:</strong> Never pay deposit before physically viewing the property. RENTECH landlords never ask for payment before a viewing.
            </div>
          </div>

          <div>
            <div class="cta-box">
              <div style="font-size:1.5rem;font-weight:800;color:#2563eb">KSh ${p.price.toLocaleString()}<span style="font-size:0.9rem;font-weight:400;color:#6b7280">/mo</span></div>
              <div style="color:#6b7280;font-size:0.82rem;margin-bottom:1rem">${p.area} · ${p.type}</div>

              <a href="https://wa.me/${p.landlord.phone}?text=${waMsg}"
                 style="display:block;background:#25d366;color:white;text-align:center;padding:14px;border-radius:12px;font-weight:700;font-size:1rem;text-decoration:none;margin-bottom:0.8rem">
                💬 WhatsApp Landlord
              </a>
              <a href="tel:+${p.landlord.phone}"
                 style="display:block;background:#f0f4ff;color:#2563eb;text-align:center;padding:12px;border-radius:12px;font-weight:600;text-decoration:none;margin-bottom:1.5rem">
                📞 Call Landlord
              </a>

              <div class="trust-badges">
                <div class="trust-badge">✅ <span>National ID Verified</span></div>
                <div class="trust-badge">✅ <span>Title Deed Checked</span></div>
                <div class="trust-badge">✅ <span>Physical Inspection Done</span></div>
                <div class="trust-badge">✅ <span>No Agent — Direct Owner</span></div>
              </div>

              <hr style="margin:1rem 0;border:none;border-top:1px solid #e8e8e8">
              <div style="font-size:0.8rem;color:#6b7280">
                👁 ${p.views} people viewed this · Posted ${new Date(p.postedDate).toLocaleDateString('en-KE',{day:'numeric',month:'short'})}
              </div>
            </div>
          </div>
        </div>

        <div style="margin-top:3rem">
          <h3>Similar Properties</h3>
          <div id="similarGrid" class="properties-grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">
            ${all.filter(x => x.id !== id && x.area === p.area).slice(0,3).map(s => `
              <div class="property-card" onclick="location.href='property-detail.html?id=${s.id}'" style="cursor:pointer">
                <div class="card-img-wrap"><img src="${s.images[0]}" alt="${s.title}" loading="lazy" style="width:100%;aspect-ratio:16/9;object-fit:cover"></div>
                <div class="card-body">
                  <div class="card-price">KSh ${s.price.toLocaleString()}<span>/mo</span></div>
                  <div class="card-title">${s.title}</div>
                  <div class="card-location">📍 ${s.area}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>
      `;
    } catch(e) {
      document.getElementById('detailRoot').innerHTML = `<div style="text-align:center;padding:4rem"><h3>Property not found</h3><a href="properties.html">← Browse all properties</a></div>`;
    }
  })();
  </script>
</body>
</html>
