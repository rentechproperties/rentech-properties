<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rentech Properties | Find Rental Homes Faster in Nairobi</title>
  <meta name="description" content="Nairobi’s first AI-powered, scam-free rental marketplace.">
  
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <nav class="glass">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">RT</div>
        <span class="syne" style="font-weight:800">RENTECH <span class="text-emerald">PROPERTIES</span></span>
      </a>
      <div class="nav-links">
        <a href="properties.html">Browse</a>
        <a href="tenant-dashboard.html">Dashboard</a>
        <a href="list-property.html">List Property</a>
      </div>
      <button class="hamburger">☰</button>
    </div>
  </nav>

  <header class="hero">
    <div class="container fade-up">
      <div class="hero-badge"><div class="dot"></div> AI-Verified Since 2025 🛡️</div>
      <h1>Find Your Home.<br>
        <span class="text-gradient rotating-text">
          <span class="active">Trust Verified.</span>
          <span>No Scam Agents.</span>
          <span>AI-Matched.</span>
        </span>
      </h1>
      <p class="subtitle">Nairobi’s safest rental platform. From Eastleigh to Karen.</p>
      
      <div class="search-card">
        <select id="hero-area"><option value="">All Nairobi</option><option value="Kilimani">Kilimani</option></select>
        <button onclick="window.location.href='properties.html'" class="btn btn-emerald">Search →</button>
      </div>
    </div>
  </header>

  <section class="section container">
    <h2>Verified Properties</h2>
    <div class="grid" id="featured-grid"></div>
  </section>

  <section class="section" style="background: var(--bg-2)">
    <div class="container grid" style="grid-template-columns: 1fr 1fr;">
      <div>
        <h2>💰 Rent Calculator</h2>
        <input type="number" id="calc-income" placeholder="Monthly Income (KSh)">
        <div id="calc-output">KSh 0</div>
      </div>
      <div id="areas">
        <h2>Our Coverage</h2>
        <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="350" style="border:0;filter:invert(90%)"></iframe>
      </div>
    </div>
  </section>

  <a href="https://wa.me/254723783337" class="wa-float" target="_blank">Chat</a>

  <script src="./js/properties.js"></script>
  <script src="./js/ai-chat.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
