<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentech Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'DM Sans',sans-serif;
            background:#0F172A;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
        }
        .login-container{max-width:400px;width:90%;}
        .login-card{
            background:#1E293B;
            border-radius:24px;
            padding:40px;
            border:1px solid rgba(255,255,255,0.07);
            box-shadow:0 20px 50px rgba(0,0,0,0.5);
        }
        .logo{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:30px;
        }
        .logo-img{
            width:60px;
            height:60px;
            background:linear-gradient(135deg,#10B981,#FFD700);
            border-radius:9px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            font-size:1.4rem;
            color:black;
        }
        .logo-text{
            display:flex;
            flex-direction:column;
            font-family:'Syne',sans-serif;
            font-weight:800;
            font-size:1.3rem;
            line-height:1.2;
        }
        .logo-text span{
            font-size:0.7rem;
            color:#FFD700;
        }
        h2{font-family:'Syne',sans-serif;margin-bottom:10px;}
        .input-group{margin-bottom:20px;}
        label{
            display:block;
            margin-bottom:8px;
            color:#CBD5E1;
            font-size:0.9rem;
        }
        input{
            width:100%;
            padding:14px;
            background:#0F172A;
            border:1px solid rgba(255,255,255,0.1);
            border-radius:12px;
            color:white;
            font-family:'DM Sans',sans-serif;
        }
        input:focus{
            outline:none;
            border-color:#FFD700;
        }
        .btn{
            width:100%;
            padding:14px;
            background:#FFD700;
            color:black;
            border:none;
            border-radius:12px;
            font-weight:600;
            font-size:1rem;
            cursor:pointer;
            transition:all 0.2s;
            margin-top:10px;
        }
        .btn:hover{
            background:#e6c200;
            transform:translateY(-2px);
            box-shadow:0 0 20px rgba(255,215,0,0.3);
        }
        .error{
            color:#EF4444;
            font-size:0.85rem;
            margin-top:15px;
            text-align:center;
        }
        .note{
            color:#64748B;
            font-size:0.8rem;
            text-align:center;
            margin-top:20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-img">RT</div>
                <div class="logo-text">RENTECH<span>ADMIN</span></div>
            </div>
            <h2>Secure Access</h2>
            <p style="color:#64748B;margin-bottom:30px;">Enter your credentials to continue</p>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="">
            </div>
            
            <button class="btn" onclick="login()">Login to Dashboard</button>
            <div id="error" class="error"></div>
            <div class="note">Username: admin / Password: abohassan</div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // ✅ UPDATED PASSWORD TO 'abohassan'
            if (username === 'admin' && password === 'abohassan') {
                sessionStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('error').textContent = 'Invalid username or password';
            }
        }
        
        // Redirect if already logged in
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
